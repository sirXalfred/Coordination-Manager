name: Gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '37 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          VERSION=8.30.1
          ASSET="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSfL -o checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt"
          curl -sSfL -o "${ASSET}" "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ASSET}"
          grep "  ${ASSET}\$" checksums.txt > checksums-linux.txt
          sha256sum -c checksums-linux.txt
          tar -xzf "${ASSET}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --source . \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Scan push diff
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            gitleaks detect --config .gitleaks.toml --redact --verbose --source .
          else
            gitleaks detect \
              --config .gitleaks.toml \
              --redact \
              --verbose \
              --source . \
              --log-opts "${{ github.event.before }}..${{ github.sha }}"
          fi

      - name: Scheduled full-history scan
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: gitleaks detect --config .gitleaks.toml --redact --verbose --source .
