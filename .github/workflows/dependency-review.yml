name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base branch/ref to compare against
        required: false
        default: main
        type: string
      head_ref:
        description: Head branch/ref to review (defaults to the branch you run from)
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Dependency review
        if: github.event_name != 'workflow_dispatch'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high

      - name: Dependency review (manual)
        if: github.event_name == 'workflow_dispatch'
        id: dependency_review_manual
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
          base-ref: ${{ inputs.base_ref }}
          head-ref: ${{ inputs.head_ref && inputs.head_ref || github.ref_name }}

      - name: Manual dependency review unsupported notice
        if: github.event_name == 'workflow_dispatch' && steps.dependency_review_manual.outcome == 'failure'
        run: |
          echo "::warning::Dependency review is unsupported for this repository context (typically missing GHAS on private repos)."
          echo "::warning::Pull request-triggered runs remain enforced when repository support is available."
