<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #e4e4e7;
      background: #1e1e2e;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      color: #a1a1aa;
      margin-bottom: 16px;
      font-size: 12px;
      line-height: 1.4;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #d4d4d8;
    }
    textarea {
      width: 100%;
      height: 280px;
      background: #0a0a0f;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      color: #e4e4e7;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      padding: 12px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #6d28d9; }
    textarea::placeholder { color: #52525b; }
    .hint {
      color: #71717a;
      font-size: 11px;
      margin-top: 6px;
      margin-bottom: 16px;
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: #6d28d9;
      color: #fff;
    }
    .btn-secondary {
      background: #27272a;
      color: #a1a1aa;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .status.info { display: block; background: #1e3a5f; color: #60a5fa; }
    .status.success { display: block; background: #14532d; color: #4ade80; }
    .status.error { display: block; background: #450a0a; color: #f87171; }
    .page-list {
      margin-top: 8px;
      font-size: 11px;
      color: #71717a;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>Coordination Manager Wireframes</h2>
  <p class="subtitle">
    Paste the wireframe JSON spec from the API endpoint
    <code>/api/figma/wireframe-spec</code> and click Generate.
  </p>

  <label for="spec">Wireframe Spec (JSON)</label>
  <textarea id="spec" placeholder='{ "projectName": "...", "pages": [...] }'></textarea>
  <p class="hint">
    Available pages: HomePage, CalendarPage, MeetingPage, AnnouncementsPage,
    FeedbackPage, SettingsPage, LoginPage, AiChatPage, EventsCalendarPage, GuardianPage
  </p>

  <div class="buttons">
    <button class="btn-primary" id="generate">Generate Wireframes</button>
    <button class="btn-secondary" id="cancel">Close</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    const specInput = document.getElementById('spec');
    const generateBtn = document.getElementById('generate');
    const cancelBtn = document.getElementById('cancel');
    const statusDiv = document.getElementById('status');

    function showStatus(type, message) {
      statusDiv.className = 'status ' + type;
      statusDiv.textContent = message;
    }

    generateBtn.addEventListener('click', () => {
      const raw = specInput.value.trim();
      if (!raw) {
        showStatus('error', 'Please paste a wireframe spec JSON');
        return;
      }

      let spec;
      try {
        spec = JSON.parse(raw);
      } catch (e) {
        showStatus('error', 'Invalid JSON: ' + e.message);
        return;
      }

      if (!spec.pages || !Array.isArray(spec.pages) || spec.pages.length === 0) {
        showStatus('error', 'Spec must contain a non-empty "pages" array');
        return;
      }

      generateBtn.disabled = true;
      showStatus('info', 'Generating ' + spec.pages.length + ' wireframe page(s)...');
      parent.postMessage({ pluginMessage: { type: 'generate', spec: spec } }, '*');
    });

    cancelBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'status') {
        showStatus('info', msg.message);
      } else if (msg.type === 'success') {
        showStatus('success', msg.message);
        generateBtn.disabled = false;
      } else if (msg.type === 'error') {
        showStatus('error', msg.message);
        generateBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
